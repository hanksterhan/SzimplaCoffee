{% extends "layout.html" %}
{% block content %}
<section class="panel narrow">
  <h2>Add merchant</h2>
  <form method="post" action="/merchants/new" class="stack">
    <label>
      Homepage URL
      <input type="url" name="url" placeholder="https://www.olympiacoffee.com" required>
    </label>
    <label>
      Crawl tier
      <select name="crawl_tier">
        <option value="A">A</option>
        <option value="B" selected>B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </label>
    <label>
      Trust tier
      <select name="trust_tier">
        <option value="trusted">trusted</option>
        <option value="candidate" selected>candidate</option>
        <option value="excluded">excluded</option>
      </select>
    </label>
    <label class="checkbox">
      <input type="checkbox" name="crawl_now" value="true" checked>
      Crawl immediately
    </label>
    <button class="button" type="submit">Add merchant</button>
  </form>
</section>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<section class="panel narrow">
  <h2>Add merchant</h2>
  <p class="note">Paste a storefront URL. SzimplaCoffee will detect the platform, assign crawl tier automatically, and crawl in the background.</p>
  <form method="post" action="/merchants/new" class="stack">
    <label>
      Homepage URL
      <input type="url" name="url" placeholder="https://www.olympiacoffee.com" required>
    </label>
    <label>
      Trust tier
      <select name="trust_tier">
        <option value="trusted">trusted</option>
        <option value="candidate" selected>candidate</option>
        <option value="excluded">excluded</option>
      </select>
    </label>
    <button class="button" type="submit">Add merchant and queue crawl</button>
  </form>
</section>
{% endblock %}

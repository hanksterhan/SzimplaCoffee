goal: >
  Phase 2: make SzimplaCoffee trustworthy at the data layer — reliable metadata,
  reliable crawls, and stable autopilot execution — so the app can support
  dependable daily buying decisions without overloading the machine.

context: >
  Phase 1 is complete: the app is now a real end-to-end product with meaningful
  merchant coverage, recommendation flows, purchase logging, brew feedback,
  Today/Watch surfaces, and a usable React SPA. The next bottleneck is not the
  presence of product surface area but the trustworthiness of the underlying
  data and automation. Metadata normalization still needs stronger canonical
  fields and confidence handling, crawl quality needs to be more observable and
  reliable, and autopilot startup is noisy/fragile due to startup-time context
  gathering failures. This phase should improve data quality before expanding
  scope aggressively.

success_criteria:
  - Autopilot can start and complete a normal cycle without recurring startup-context failure noise or broken notification routing
  - Coffee metadata normalization provides canonical origin_country, roast_level, and process_family semantics with confidence/provenance on active coffee products
  - Metadata coverage and trust improve enough that origin and roast filtering are product-trustworthy for the active catalog
  - Crawl quality is observable per merchant, with reliability/trust signals that distinguish high-confidence merchants from degraded ones
  - Crawl execution follows low-CPU serialized or staggered patterns; no parallel heavy work is required for routine cycles
  - The next backlog is refilled with metadata/crawl-focused tickets and at least 2 ready tasks remain available for autopilot
  - Backend tests pass and any touched frontend/build contracts remain green

current_state: >
  Phase 1 goal was completed at SC-92. There are no open tickets in `.tickets/open/`.
  The current priority is to move into a data-trust phase centered on metadata
  normalization, crawl quality, and autopilot stability. Recent autopilot runs
  indicate startup-time ByteRover query rate-limit failures and notification
  session-key mismatch noise that should be cleaned up before relying on the
  automation loop.

priority_order:
  - Autopilot stability: eliminate startup failure/noise and fix notification/session routing
  - Coffee metadata normalization: canonical fields, confidence, provenance, and post-crawl fill quality
  - Crawl quality: reliability scoring, extraction observability, and merchant trust signals
  - Trustworthy catalog semantics: server-side filtering/sorting that reflect normalized metadata and real availability semantics
  - Historical deal intelligence: build the next phase only after metadata and crawl foundations are trustworthy

phase_3_preview:
  goal: >
    Phase 3: turn trustworthy catalog data into daily buying intelligence with
    historical deal baselines, server-side truth-based ranking, and a Today
    view that can answer what to buy right now.
  success_criteria:
    - Historical offer baselines support trustworthy sale/deal scoring
    - Today view can rank quality-clearing deals from trusted merchants
    - Product search and sorting are server-side and corpus-wide rather than client-window-limited
    - Merchant expansion can continue without degrading crawl or metadata trust

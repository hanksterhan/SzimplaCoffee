project_prefix: "SC"
planning:
  brainstorm_packet: ".plans/brainstorm-current.md"
  stale_after_hours: 72
backlog:
  min_ready_tasks: 2
  refill_batch_epics: 5
  refill_tickets_per_epic: 6
delivery:
  max_tasks_per_run: 1
  max_runtime_minutes: 45
  pr_mode: "draft"
  base_branch: "stage"
  merge_to_main: false
resource_guardrails:
  avoid_cpu_overload: true
  guidance:
    - "Do not overload any session; prefer bounded, serialized work over parallel heavy jobs."
    - "Keep CPU usage conservative during crawls, parsing, builds, and verification."
    - "Avoid running multiple expensive tasks at once unless they are known to be lightweight."
    - "Prefer smaller batches and staggered execution when processing merchants or metadata refreshes."
escalation:
  ask_human_when:
    - "product ambiguity"
    - "scope expansion"
    - "secret or credential work"
    - "destructive migration"
    - "prod infra or billing risk"
    - "same task fails twice"
reflection:
  every_n_completed: 5

notifications:
  # Set session_key to route run summaries via sessions_send.
  # Example: "agent:1:telegram:group:-1003759576826:topic:2"
  # Leave empty to disable notifications.
  session_key: ""

id: SC-32
title: "Merchant quality profile generator — auto-score all merchants"
type: feature
priority: p1
status: open
owner: h6nk-bot
created_at: "2026-03-14T00:00:00Z"
updated_at: "2026-03-14T00:00:00Z"
labels: [sprint-2a, data-quality, merchant-scoring, recommendation-engine]

problem: "Only 4 of 16 merchants have quality profiles. The other 12 default to 0.5 across all scores, making _merchant_quality_score() unable to differentiate trusted roasters from unknowns. The north star says: 'rank trusted merchants and proven roasters higher.'"
desired_outcome: "All merchants have quality profiles generated from observable data (product metadata density, description quality, shipping info, freshness signals, espresso focus). Profiles update automatically after each crawl run."

scope_in:
  - "New service: backend/src/szimplacoffee/services/quality_scorer.py"
  - "Score freshness_transparency: based on roast-date mentions, 'roasted to order' signals in product descriptions"
  - "Score shipping_clarity: based on shipping policy data, free shipping threshold presence"
  - "Score metadata_quality: based on % of products with origin, process, tasting notes filled"
  - "Score espresso_relevance: based on % of products marked espresso-suitable or having espresso-related terms"
  - "Score service_confidence: based on crawl success rate, product count, data consistency"
  - "Compute overall_quality_score as weighted combination"
  - "CLI command: szimplacoffee score-merchants"
  - "Auto-run after crawl completes (hook into crawl pipeline)"
  - "API endpoint: POST /api/v1/merchants/{id}/rescore"
scope_out:
  - "Personal profile scoring (requires purchase history, kept manual)"
  - "External review data (no third-party APIs)"
  - "Manual override UI (use existing merchant edit for now)"


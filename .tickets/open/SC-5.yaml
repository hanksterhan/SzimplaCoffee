id: SC-5
title: "Richer product-note parsing for origin, process, and tasting notes"
type: improvement
priority: p2
status: draft
owner: h6nk-bot
created_at: "2026-03-14T22:00:00Z"
updated_at: "2026-03-14T22:00:00Z"
labels:
  - track-crawl
  - product-parsing
  - espresso-fit

problem: "Product descriptions contain rich origin, process, variety, and tasting-note signals but the current parser extracts them with low fidelity. Fields like origin_text, process_text, variety_text, and tasting_notes_text are often empty or over-broad, reducing espresso_fit scoring accuracy."
desired_outcome: "Product note parsing extracts structured origin, process, variety, roast cues, and tasting notes from unstructured product descriptions with measurably higher fidelity. Espresso-relevance scoring benefits from richer structured data."

scope_in:
  - "Regex + heuristic extraction for origin country/region, process (washed/natural/honey/anaerobic), variety (typica/geisha/etc), roast cues (light/medium/dark), tasting notes"
  - "Confidence score per extracted field"
  - "Unit tests with real product description fixtures from known merchants"
scope_out:
  - "LLM-based extraction (not for v1)"
  - "Retroactive re-parsing of existing product records"
  - "Multi-language product descriptions"


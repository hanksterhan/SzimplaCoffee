problem: "The merchant list and discovery queue display merchants in a flat list without useful filtering or sorting. Operators cannot quickly find merchants by crawl tier, trust tier, platform type, or staleness — making it hard to prioritize crawl work or review candidates."
desired_outcome: "The merchant list and discovery queue support filtering by crawl tier, trust tier, platform, and active status. They support sorting by name, last crawl time, and quality score. Filters persist within the session."

scope_in:
  - "Filter controls: crawl_tier, trust_tier, platform_type, is_active"
  - "Sort controls: name, last_crawl_at, overall_quality_score"
  - "HTMX-driven filter/sort without full page reload"
  - "Filter state persisted via URL query params"
scope_out:
  - "Saved filter presets"
  - "Full-text search (existing FTS5 is separate)"
  - "Mobile-responsive redesign"


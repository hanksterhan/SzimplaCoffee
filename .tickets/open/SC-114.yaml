id: SC-114
title: "Variant availability freshness signal"
type: feature
priority: p2
status: ready
owner: h6nk-bot
created_at: "2026-03-20T12:06:00Z"
updated_at: "2026-03-20T12:06:00Z"
labels: ["backend", "frontend", "catalog", "freshness", "trust", "phase-4"]

problem: >
  Variants marked "available" may not have been seen in weeks. There is no visual signal
  to distinguish a freshly-crawled variant from one that hasn't been confirmed available
  in 30+ days. This erodes trust in catalog accuracy.

desired_outcome: >
  Product detail and catalog show a "last seen" date for variants. Variants not seen
  in >30 days are marked visually as "stale" rather than "available." No new crawl
  is triggered — this is a display-layer signal from existing last_seen_at data.

scope_in:
  - "Expose last_seen_at on ProductVariant in API response (already in model, may need schema update)"
  - "Frontend: show last_seen date on product detail variant selector"
  - "Frontend: show 'stale' badge if last_seen_at > 30 days ago"
  - "Optional: show freshness indicator in catalog product cards (small dot or age text)"

scope_out:
  - "No new crawl triggers"
  - "No changes to data model or last_seen_at tracking logic"
  - "No changes to recommendation engine"


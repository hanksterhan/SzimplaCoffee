created_at: "2026-03-18T00:00:00Z"
updated_at: "2026-03-18T00:00:00Z"
labels: ["recommendation", "epic-3", "ux"]

problem: "When recommendations return empty or unexpected results it is impossible to understand why without reading source code. There is no explain mode that exposes per-candidate scores or filter elimination reasons."
desired_outcome: "POST /api/v1/recommendations accepts an optional explain_scores flag. When true, each candidate in the response includes a score_breakdown object showing the contribution of each scoring factor and whether/why it was filtered."

scope_in:
  - "Add explain_scores boolean to recommendation request schema"
  - "Return per-candidate score breakdown when explain_scores=true"
  - "Show filter elimination reasons for excluded candidates"
  - "Add explain toggle to the recommend.lazy.tsx frontend route"
scope_out:
  - "Fixing the scoring algorithm itself (SC-66)"
  - "Persisting explain data to DB"
  - "Export or CSV of explain results"

dependencies:
  blockers: ["SC-66"]
  unblocks: []

acceptance_criteria:
  - id: AC-1
    text: "POST /api/v1/recommendations with explain_scores=true returns score_breakdown per candidate"
    verify: "curl -s -X POST http://localhost:8000/api/v1/recommendations -H 'Content-Type: application/json' -d '{\"current_inventory_grams\": 0, \"explain_scores\": true}' | python -c \"import json,sys; d=json.load(sys.stdin); r=d.get('results', []); print(r[0].get('score_breakdown') if r else 'no results')\""
    status: pending
  - id: AC-2
    text: "Filtered candidates include a filter_reason when explain_scores=true"
    verify: "curl -s -X POST http://localhost:8000/api/v1/recommendations -H 'Content-Type: application/json' -d '{\"current_inventory_grams\": 0, \"explain_scores\": true}' | python -c \"import json,sys; d=json.load(sys.stdin); print(d.get('filtered_candidates', 'no key'))\""
    status: pending
  - id: AC-3
    text: "Frontend explain toggle renders score breakdown without build errors"
    verify: "cd frontend && npm run build 2>&1 | tail -5"

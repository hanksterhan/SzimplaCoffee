    text: "At least 8 of the 10 targeted merchants have products in the DB after initial crawl"
    verify: "szimpla crawl-all then check merchant list in DB or dashboard"
    status: pending
  - id: AC-2
    text: "Active merchant count is >= 24 (up from 16)"
    verify: "curl http://localhost:8000/api/v1/dashboard/metrics | jq .merchant_count"
    status: pending
  - id: AC-3
    text: "szimpla score-merchants runs without error after all adds"
    verify: "cd backend && . .venv/bin/activate && szimpla score-merchants"
    status: pending
  - id: AC-4
    text: "No new merchants are in tier D (if any fail to crawl, document and skip)"
    verify: "DB check: SELECT name, crawl_tier FROM merchants WHERE is_active = 1"
    status: pending

verification_required:

id: SC-101
title: "Merchant expansion: verify and import 10 top-priority merchants from seed list"
type: feature
priority: p2
status: ready
owner: h6nk-bot
created_at: "2026-03-20T01:40:00Z"
updated_at: "2026-03-20T01:40:00Z"
labels: ["merchants", "catalog", "data", "expansion"]

problem: >
  The current merchant set covers 16 active merchants with good crawl quality. The
  60-merchant seed list at SzimplaCoffee/brain/merchants/top-500-seed.md contains
  verified top-tier specialty roasters that would meaningfully expand catalog depth,
  origin diversity, and recommendation quality. Now that crawl execution is serialized
  (1 merchant per 15-min tick via APScheduler), adding 10 more merchants is safe —
  they will not cause CPU spikes or parallel crawl load. Without expansion, the
  recommendation engine is limited to a small set of origins and roasters.

desired_outcome: >
  10 new merchants are added to the DB via `szimpla add-merchant <url>` for the
  highest-priority candidates from the seed list. Each merchant gets an initial crawl,
  basic product catalog seeded, and a quality profile scored. The total merchant count
  moves from 16 to ~26 active merchants. No code changes required — this is a data
  operation using the existing CLI.

scope_in:
  - "Read SzimplaCoffee/brain/merchants/top-500-seed.md and select 10 highest-priority candidates"
  - "Verify each URL is reachable before importing"
  - "Run szimpla add-merchant <url> for each verified merchant (serialized, not parallel)"
  - "After all adds, run szimpla score-merchants to refresh quality profiles"
  - "Update brain/merchant-intel/ notes for any merchants with notable crawl quality or coverage"
  - "Confirm total active merchant count increased and at least 8 of 10 crawled successfully"
scope_out:
  - "Bulk import scripts or automation (use CLI)"
  - "Custom adapters for merchants that fail initial crawl"
  - "Shopify/WooCommerce adapter changes"
  - "Importing more than 10 merchants in this ticket"


problem: "Custom-platform merchants (Squarespace, standalone sites) are currently marked as discovery-only with no crawl capability. This leaves a significant subset of quality roasters un-crawlable, reducing the system's merchant coverage."
desired_outcome: "A decision is made about how to handle custom-platform merchants. Either a first-pass static HTML adapter is implemented for Squarespace-like stores, or a clear policy is established for when browser fallback is acceptable for custom platforms."

scope_in:
  - "Platform detection expansion to identify Squarespace-hosted stores"
  - "Decision record for custom-platform crawl strategy (ADR)"
  - "First-pass static HTML product crawler for Squarespace if viable"
  - "Adapter skeleton with detect(), discover_entrypoints(), crawl_catalog() interface"
scope_out:
  - "Full Squarespace API integration (no official public API)"
  - "Automatic browser crawl for all custom-platform merchants"
  - "CSS/JS-heavy stores that require full browser execution"


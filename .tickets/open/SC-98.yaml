id: SC-98
title: "Expose deal baselines in catalog API and Today view"
type: feature
priority: p1
status: ready
owner: h6nk-bot
created_at: "2026-03-19T21:54:00Z"
updated_at: "2026-03-19T21:54:00Z"
labels: ["deal-score", "catalog", "backend", "frontend", "phase-3-unlocker"]

problem: >
  VariantDealFact already computes historical baselines (7d/30d median price,
  historical low, compare_at discount %) after every crawl, but these signals
  are not surfaced in the catalog API response or the Today view. Without deal
  baseline data in the API, the frontend cannot show "X% below 30-day price"
  or "historical low" badges — signals that would make daily buying decisions
  more actionable. Phase 3 deal-scoring depends on this data being accessible.

desired_outcome: >
  ProductSummary and ProductDetail API schemas expose deal fact fields when present.
  The Today view (and product cards where relevant) can display "X% off 30d avg"
  or "historical low" badges. materialize_variant_deal_facts already runs post-crawl;
  this ticket wires the computed data into the API response and uses it in the UI.

scope_in:
  - "Add deal fact fields to ProductVariantSchema or ProductSummary (null-safe)"
  - "Update /api/v1/products catalog and detail endpoints to include deal_fact fields"
  - "Add frontend badge/label for deal signals in ProductCard and ProductQuickView"
  - "Regenerate frontend API types after schema change"
  - "Add API response test for deal_fact fields"
scope_out:
  - "Recommendation engine re-ranking on deal score (separate ticket)"
  - "Historical chart UI"
  - "Backfilling missing VariantDealFact rows (already runs post-crawl)"
  - "New DB migrations (no schema changes needed; VariantDealFact already exists)"


problem: "Purchases are logged but there is no link between a purchase and the recommendation run that suggested it. Without this linkage we cannot measure recommendation conversion or close the learning loop."
desired_outcome: "PurchaseHistory model has an optional recommendation_run_id foreign key. PurchaseForm accepts and saves it. The API stores and returns it."


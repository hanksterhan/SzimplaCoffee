  - "Add recommendation_run_id nullable FK to PurchaseHistory model"
  - "Create and apply Alembic migration"
  - "Update history API to accept and return recommendation_run_id"
  - "Update PurchaseForm to accept optional recommendation_run_id prop"
scope_out:
  - "Analytics or reporting on recommendation conversion rate"
  - "Automatic pre-population of recommendation_run_id from URL"
  - "Brew feedback linkage"


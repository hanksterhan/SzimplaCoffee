created_at: "2026-03-20T12:06:00Z"
updated_at: "2026-03-20T12:06:00Z"
labels: ["backend", "frontend", "recommendations", "espresso", "phase-4"]

problem: >
  The user has a DE1 with 58mm and 49mm baskets. Basket-type preference is not factored
  into recommendation ranking. is_espresso_recommended exists as a product flag but
  shot_style preference is not a first-class input to the recommendation request.

desired_outcome: >
  The recommendation API accepts a `shot_style` parameter (modern_58mm | lever_49mm | any).
  When set, products matching the basket affinity (is_espresso_recommended=True for
  espresso requests) are boosted. The Today view request form includes a shot-style
  selector. Simple routing signal — no new ML model.

scope_in:
  - "Add `shot_style: str | None` parameter to POST /api/v1/recommendations request"
  - "When shot_style != 'any', boost is_espresso_recommended products in ranking"
  - "Frontend: add shot_style selector (radio or select) to Today view request form"
  - "Backend test covering shot_style boost behavior"

scope_out:
  - "No new data model fields or migrations"
  - "No DE1 integration or shot profile logging"
  - "No changes to brew feedback schema"
  - "No new scoring sub-model — just a conditional boost multiplier"


id: SC-106
title: "Suppress unknown metadata values in catalog filter UX and product tags"
type: feature
priority: p2
status: ready
owner: h6nk-bot
created_at: "2026-03-20T06:23:00Z"
updated_at: "2026-03-20T06:23:00Z"
labels: ["frontend", "catalog", "metadata", "ux", "phase-3"]

problem: >
  After SC-94 and SC-102, canonical fields (roast_level, process_family, origin_country)
  are on all active products. However unknown values (roast_level="unknown",
  process_family="unknown") appear in the frontend filter dropdowns as valid selectable
  options. This confuses users: selecting "unknown roast" is meaningless. Similarly,
  buildTags() in ProductCard shows "unknown" as a visible chip/tag. Non-coffee products
  (gear, subscriptions, gift cards) are included in the catalog filter counts and can
  appear in filter results even when using the espresso or origin filters. The catalog
  UX needs to treat "unknown" as absent and ideally surface only coffee products in
  espresso-relevant filter modes.

desired_outcome: >
  The catalog filter UI never shows "unknown" as a selectable option for roast or
  process. Product tags never display "unknown" as a visible chip. Non-coffee products
  (is_coffee=False) are excluded from the filter option generation or at minimum
  excluded from roast/process/origin filter counts. Filter options show real values
  only (washed, natural, light, medium, dark, etc.). Users see a clean, trustworthy
  filter panel.

scope_in:
  - "Filter panel: exclude 'unknown' from roast_level and process_family option lists"
  - "buildTags(): skip tag generation for unknown values (return no chip vs. 'unknown' chip)"
  - "ProductCard metadata display: treat origin_country=null and unknown values as absent (show nothing instead of 'Unknown origin')"
  - "ProductSummary API: optionally skip is_coffee=False products from filter facet computation if a filter param is active"
  - "If backend already returns unknown as a facet option, filter it out client-side in the hook/component"
  - "Add a frontend test or type guard confirming unknown is never rendered as a visible tag or filter option"
scope_out:
  - "No changes to DB values — unknown stays in the DB, only filtered in display"
  - "No changes to backend filter query logic (client-side suppression is sufficient)"
  - "No changes to recommendation scoring"
  - "No new backend endpoints or schema changes"


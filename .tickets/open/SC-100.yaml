problem: >
  The dashboard API already computes metadata fill rates (origin_pct, process_pct,
  roast_pct, variety_pct) via MetadataFillRates but the React SPA dashboard page
  does not display them. Operators have no at-a-glance visibility into parser
  coverage progress. After SC-97 improves parser patterns, there's no UI to verify
  that fill rates actually improved.

desired_outcome: >
  The SPA dashboard shows a compact fill-rate widget with colored progress bars or
  percentage badges for origin, process, roast, and variety coverage. The widget
  uses existing /api/v1/dashboard/metrics data; no new API changes needed.

scope_in:
  - "Add MetadataFillRateWidget component (or equivalent inline section) to the dashboard route"
  - "Display origin_pct, process_pct, roast_pct, variety_pct with visual progress indicators"
  - "Use existing useDashboard hook / query; no new API endpoints"
  - "Show a 'Goal: 70%' marker or baseline annotation for origin_pct (matches goal.yaml criterion)"
scope_out:
  - "Historical fill-rate chart over time"
  - "New backend API changes"
  - "Alerts or automated notifications on fill-rate drop"
  - "Per-merchant fill-rate breakdown"


  - "Accept --file path argument pointing to a newline-delimited URL list"
  - "Call existing add-merchant logic per URL"
  - "Print success/failure summary with counts"
  - "Skip duplicate URLs already in registry"
scope_out:
  - "Crawling imported merchants (handled by crawl-all)"
  - "GUI/web interface for bulk import"
  - "Async/parallel import"


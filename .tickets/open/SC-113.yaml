problem: >
  10 purchases are logged in purchase_history but the app has no analysis surface.
  There is no "time since last order," no "roasters I haven't tried lately," and no
  value-per-gram tracking. The data exists but is invisible.

desired_outcome: >
  A small "My buying patterns" stats card appears on the Purchases page (or Today page)
  showing: days since last order, top 3 roasters by purchase count, and estimated
  average grams per week based on purchase gaps. Backed by a dedicated API endpoint.

scope_in:
  - "Add GET /api/v1/history/purchase-stats endpoint returning: days_since_last_order, top_roasters (list of {merchant_name, count}), avg_grams_per_week"
  - "Compute from existing purchase_history rows (no new data model)"
  - "Frontend: add PurchaseStatsCard component to Purchases page"
  - "Backend test for purchase stats computation"

scope_out:
  - "No Notion import or external sync"
  - "No wallet or credit tracking"
  - "No changes to purchase_history schema"
  - "No changes to recommendation engine"


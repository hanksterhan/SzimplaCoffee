labels:
  - track-crawl
  - promo
  - quality

problem: "The promo extraction pipeline generates false positives — banners, shipping notices, and generic site-wide text are being captured as promos. This degrades recommendation quality because promo scores inflate for merchants that don't actually have active deals."
desired_outcome: "Promo extraction uses stronger confidence heuristics to suppress false positives. Promo snapshots with low confidence are stored but downweighted in scoring. The false-positive rate drops measurably on known-good test merchants."

scope_in:
  - "Confidence heuristics for promo extraction (discount code presence, percent/dollar patterns, explicit promo language)"
  - "Low-confidence suppression in recommendation scoring"
  - "Test fixtures for known false-positive and known-true-positive cases"
scope_out:
  - "LLM-based promo classification"
  - "User-facing promo review UI"
  - "Retroactive re-scoring of historical snapshots"


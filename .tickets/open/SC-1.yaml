id: SC-1
title: "Crawl-health and merchant-error visibility in the web UI"
type: feature
priority: p1
status: draft
owner: h6nk-bot
created_at: "2026-03-14T22:00:00Z"
updated_at: "2026-03-14T22:00:00Z"
labels:
  - track-crawl
  - ui
  - observability

problem: "Operators have no way to see crawl health, per-merchant error state, or stale-data warnings in the UI. Failures are silent and only discoverable by reading raw logs or querying the database directly."
desired_outcome: "The web UI surfaces crawl run status, error summaries, and stale-data indicators per merchant so operators can detect and address crawl problems without touching the database."

scope_in:
  - "Crawl run status display on merchant detail page"
  - "Per-merchant error summary pulled from crawl_runs table"
  - "Stale-data indicator when last successful crawl is older than tier threshold"
  - "Job/crawl health dashboard page showing recent runs across all merchants"
scope_out:
  - "Real-time WebSocket updates"
  - "Email or push alerting"
  - "Automatic retry triggering from the UI"

dependencies:
  blockers: []
  unblocks:
    - SC-2

acceptance_criteria:
  - id: AC-1
    text: "Merchant detail page shows last crawl run status, adapter used, records written, and error summary."
    verify: "pytest tests/ -v -k test_merchant_detail_crawl_health"
    status: pending
  - id: AC-2
    text: "Stale-data badge appears on merchants whose last successful crawl exceeds their tier threshold (A: 6h, B: 24h, C: 7d)."
    verify: "pytest tests/ -v -k test_stale_data_badge"
    status: pending
  - id: AC-3
    text: "Job/crawl health page lists recent crawl runs with status, merchant, and error summary across all merchants."
    verify: "pytest tests/ -v -k test_crawl_health_page"
    status: pending


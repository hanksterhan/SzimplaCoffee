id: SC-97
title: "Improve metadata fill rate: expand parser patterns for roast and process"
type: feature
priority: p2
status: ready
owner: h6nk-bot
created_at: "2026-03-19T21:54:00Z"
updated_at: "2026-03-19T21:54:00Z"
labels: ["metadata", "parser", "backend", "data-quality"]

problem: >
  roast_level=unknown (277/918 products, ~30%) and process_family=unknown (458/918, ~50%)
  are too common. These unknowns suppress useful filter options and reduce recommendation
  quality. The coffee_parser.py pattern sets are incomplete: many common roast descriptors
  (e.g. "blonde", "half-caff", numeric degree codes) and process families
  (e.g. "giling basah", "semi-washed", "double fermented", "carbonic maceration")
  are not matched. Backfill is triggered post-crawl but the parser patterns haven't been
  significantly expanded since initial implementation.

desired_outcome: >
  Expanded parser patterns for roast_level and process_family reduce "unknown" rates
  measurably on the current product catalog. New patterns are covered by tests.
  Running szimpla backfill-metadata against the live DB improves overall fill rates.

scope_in:
  - "Expand _normalize_roast_level patterns in coffee_parser.py"
  - "Expand _normalize_process_family patterns in coffee_parser.py"
  - "Add unit tests for newly matched patterns in test_coffee_parser.py"
  - "Run szimpla backfill-metadata against live DB and report before/after counts"
  - "Update dashboard fill-rate baseline comment if coverage changes significantly"
scope_out:
  - "Storing or indexing product description_html (separate ticket)"
  - "Farm-name-to-origin mapping"
  - "ML/LLM-based classification"
  - "Parser rewrites or architecture changes"


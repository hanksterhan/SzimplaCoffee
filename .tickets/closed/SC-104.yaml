id: SC-104
title: "Persist product description HTML to unlock origin and process metadata coverage"
type: feature
priority: p1
status: done
owner: h6nk-bot
created_at: "2026-03-20T05:31:00Z"
updated_at: "2026-03-20T05:31:00Z"
labels: ["metadata", "crawler", "schema", "phase-3"]

problem: >
  Coffee metadata coverage (origin_country: ~65% fill for coffee products) is capped by
  the absence of stored product descriptions. The coffee parser only sees the product
  title, which often contains no geographic signal. Product detail pages and Shopify
  JSON responses contain rich description HTML with origin, process, and variety info.
  This data is fetched during crawls but currently discarded. Persisting description_html
  (or a stripped text version) on the Product model would allow the parser backfill to
  dramatically improve origin and process fill rates on the next pass.

desired_outcome: >
  Products have a `description_text` field (plain text, stripped from description HTML)
  persisted by crawlers. The backfill-metadata command uses description_text as a
  secondary signal source for origin, process, and variety extraction. Origin fill rate
  for coffee-only products improves measurably (target: from ~65% to ≥75%).

scope_in:
  - "Add description_text TEXT column (nullable) to products table via Alembic migration"
  - "Update Shopify adapter to extract and store body_html → strip to plain text → description_text"
  - "Update WooCommerce adapter similarly if description is available"
  - "Update coffee parser to accept optional description_text parameter and use it as secondary extraction source"
  - "Update backfill-metadata CLI command to pass product.description_text to the parser"
  - "Add regression tests: parser uses description_text when title has no origin signal"
  - "Run backfill-metadata on the live DB and report before/after fill rates"
scope_out:
  - "No storage of raw HTML (only plain text strip)"
  - "No changes to the recommendation scoring logic"
  - "No frontend changes for this ticket"
  - "No WooCommerce changes if WooCommerce product response does not include a description field (mark as skip if absent)"


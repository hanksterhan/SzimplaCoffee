id: SC-109
title: "Today view deal-score: rank quality-clearing deals using historical price baseline"
type: feature
priority: p1
status: done
owner: h6nk-bot
created_at: "2026-03-20T08:06:00Z"
updated_at: "2026-03-20T08:06:00Z"
labels: ["backend", "frontend", "today", "deals", "phase-3"]

problem: >
  The Today view shows recommended coffees but cannot distinguish a great deal from a
  normal price. Without historical price baselines, the recommendation engine ranks
  primarily on quality score and freshness — there is no signal for "this coffee is
  currently 20% below its median price." The Phase 3 core promise is daily buying
  intelligence: knowing not just what coffee is good but whether now is a good time
  to buy it. This requires integrating SC-107's VariantPriceBaseline into deal scoring.

desired_outcome: >
  The recommendation engine computes a deal_score for each variant based on current
  price vs. historical baseline (e.g., % below median baseline). The Today view surfaces
  deal badges ("Good deal", "At baseline", "Above baseline") on recommendation cards.
  The final ranking blends quality_score and deal_score with a configurable weight.
  "Wait" recommendations are emitted when no variant clears the quality threshold AND
  current prices are above baseline.

scope_in:
  - "Add deal_score computation to recommendation service: (baseline_price - current_price) / baseline_price, clamped [-1, 1]"
  - "Blend deal_score into recommendation ranking: final_score = quality_weight * quality_score + deal_weight * deal_score (configurable weights, defaults quality_weight=0.7, deal_weight=0.3)"
  - "Add deal_score, deal_badge ('great_deal' | 'good_deal' | 'at_baseline' | 'above_baseline' | 'no_baseline') to RecommendationItem response schema"
  - "Frontend Today view: render deal badge on recommendation cards when present"
  - "Emit 'wait' recommendation when best available deal_score < -0.05 and quality_score < threshold"
  - "Backend tests: deal_score computation, blended ranking, badge assignment"
scope_out:
  - "No changes to the baseline computation itself (SC-107)"
  - "No changes to the catalog browse sort (SC-108)"
  - "No subscription deal integration in this ticket"
  - "No historical chart view of price trends"


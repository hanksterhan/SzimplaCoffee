problem: "All 9,352 offer snapshots are from a single day (2026-03-09). Price history charts are meaningless, the system can't detect sales or price drops, and the 'should I wait?' recommendation is impossible. The north star envisions automated catalog and promotion refreshes."
desired_outcome: "A scheduler that re-crawls merchants at configurable intervals based on their crawl_tier (A=twice daily, B=daily, C=weekly). After running for a week, offer_snapshots should have multi-day temporal depth. UI shows crawl schedule status."
scope_in:
  - "New module: backend/src/szimplacoffee/services/scheduler.py"
  - "Tier-based scheduling: A=12h, B=24h, C=168h (configurable)"
  - "CLI command: szimplacoffee run-scheduled-crawls \u2014 checks what's due, crawls it"
  - "CLI command: szimplacoffee crawl-schedule \u2014 shows next crawl times for all merchants"
  - "System cron integration: example crontab entry in docs"
  - "API endpoint: GET /api/v1/crawl-schedule \u2014 shows upcoming crawls"
  - "API endpoint: POST /api/v1/crawl-schedule/run \u2014 trigger all due crawls"
  - "Track last_crawled_at per merchant (may already exist via CrawlRun)"
  - "Frontend: crawl schedule status on dashboard"
scope_out:
  - "Background task queue (APScheduler, Celery) \u2014 use cron for now"
  - "Distributed crawling"
  - "Rate limiting per merchant domain"
  - "Crawl failure alerting"

id: SC-110
title: "Description-based metadata backfill re-pass"
type: feature
priority: p1
status: in_progress
owner: h6nk-bot
created_at: "2026-03-20T12:06:00Z"
updated_at: "2026-03-20T12:06:00Z"
labels: ["backend", "metadata", "backfill", "origin", "phase-4"]

problem: >
  Origin coverage is at ~56% on active products. SC-104 stored description_text for all
  products during crawl, but the subsequent metadata backfill pass ran before those
  descriptions were populated. Re-running the metadata parser over products that have
  description_text != NULL but still have weak/missing origin_country, roast_level, or
  process_family will increase fill rates using richer source text already on disk.

desired_outcome: >
  A re-pass of the metadata parser runs over all active products with non-null
  description_text, updating origin_country, roast_level, and process_family where the
  parser finds higher-confidence signals. Origin coverage increases from ~56% toward 70%+.
  A CLI command executes the re-pass and prints a before/after fill-rate summary.

scope_in:
  - "Add `backfill-descriptions` CLI subcommand (or extend `backfill-metadata`) to re-parse products with description_text != NULL"
  - "Only overwrite metadata fields where new confidence is higher than existing confidence"
  - "Print before/after fill-rate counts for origin_country, roast_level, process_family"
  - "Backend test covering the re-pass logic on sample product data"

scope_out:
  - "No new crawl runs or HTTP fetches"
  - "No changes to the parser rules themselves (existing extractor logic only)"
  - "No frontend changes"
  - "No changes to Product schema"


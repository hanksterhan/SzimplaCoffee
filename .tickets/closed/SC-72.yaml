id: SC-72
title: Wire brew feedback scores into recommendation ranking
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: '2026-03-18T00:00:00Z'
updated_at: '2026-03-18T18:27:00Z'
labels:
- purchase-loop
- epic-4
- recommendation
problem: Brew feedback ratings are collected but not used. Products rated poorly in
  brew sessions continue to appear in recommendations at full score, defeating the
  purpose of the feedback loop.
desired_outcome: The recommendation engine reads avg brew rating per product from
  brew_feedback. Products with avg rating < 3.0 receive a configurable score penalty.
  Tests confirm the penalty applies.
scope_in:
- Add SQL query in recommendations.py to compute avg brew rating per product
- Apply a configurable penalty to score for products with avg rating < 3.0
- Add/update pytest tests to verify penalty behavior
- Keep penalty configurable via a constant or config value
scope_out:
- UI for viewing brew feedback impact
- Merchant-level brew feedback aggregation
- Automatic exclusion of zero-rated products
dependencies:
  blockers:
  - SC-71
  - SC-66
  unblocks: []

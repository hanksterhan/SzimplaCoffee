id: SC-100
title: "Today view: surface deal-score badges using VariantDealFact data"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-20T01:40:00Z"
updated_at: "2026-03-20T01:40:00Z"
labels: ["today", "frontend", "deal-score", "phase-3-unlocker"]

problem: >
  SC-98 exposed DealFactSchema fields (7d/30d median price, historical_low_cents,
  compare_at_discount_percent) in the catalog API and ProductCard/QuickView badges.
  However, the Today view (today.lazy.tsx) still builds its pick cards from the
  recommendation engine response (TodayBriefResult), which does not yet thread
  deal_fact data through to the UI. The top_pick and runner_up cards show price
  and discount but cannot show "X% below 30-day average" or "historical low" signals
  because those fields are not wired from the API into the Today card rendering.

desired_outcome: >
  Today view pick cards (TopPickCard, RunnerUpCard) display deal-score signals when
  present: "X% below 30-day avg", "Historical low" badge, or compare_at discount %.
  When no deal_fact data is available (variant has no history yet), cards degrade
  gracefully with no badge shown. No backend changes needed — DealFactSchema is
  already returned by the recommendation engine's underlying product data;
  this ticket wires the fields into the Today card rendering and the hook response type.

scope_in:
  - "Inspect TodayBriefResult and use-today hook to confirm deal_fact field availability"
  - "If deal_fact fields are absent from TodayBriefResult: extend the /today/brief schema in backend to include them, regenerate schema.d.ts"
  - "If deal_fact fields are present: wire them into TopPickCard and RunnerUpCard rendering"
  - "Render 'X% below 30d avg' badge when median_price_30d_cents present and current price is lower"
  - "Render 'Historical low' badge when historical_low_cents matches current price"
  - "Graceful no-badge fallback when deal_fact is null"
  - "Frontend build and tsc must pass"
scope_out:
  - "Recommendation re-ranking on deal score (separate ticket)"
  - "Historical price chart UI"
  - "Deal score in product catalog cards (already done in SC-98)"
  - "New DB migrations"


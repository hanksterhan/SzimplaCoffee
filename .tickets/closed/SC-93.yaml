problem: "Autopilot runs keep producing startup-time failure noise. Recent sz-coffee-autopilot session logs show mandatory startup context gathering attempts hitting a ByteRover daily rate limit, and the configured `policy.notifications.session_key` does not resolve to a valid session. This makes startup look broken, obscures real failures, and reduces confidence in the automation loop."
desired_outcome: "Autopilot startup is quiet and reliable: startup-time context gathering failures are handled or removed from the critical path, notification routing uses a valid target (or is disabled cleanly), and a normal autopilot cycle can complete without recurring startup-noise errors."

scope_in:
  - "Inspect sz-coffee-autopilot agent/session configuration and recent session logs"
  - "Identify the concrete startup failure/noise sources and document root cause"
  - "Fix notification routing mismatch in autopilot policy or agent/session config"
  - "Adjust autopilot startup path so ByteRover rate-limit failures do not present as startup failure"
  - "Verify one clean autopilot cycle after the fix"
scope_out:
  - "General OpenClaw upgrades unrelated to the autopilot startup path"
  - "Large redesign of the entire autopilot skill protocol"
  - "Non-SzimplaCoffee autopilot agents"


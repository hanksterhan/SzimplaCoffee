id: SC-79
title: "DE1 Visualizer bridge: auto-import shot data as BrewFeedback records"
type: feature
priority: p1
status: done
owner: h6nk-bot
created_at: "2026-03-18T08:45:00Z"
updated_at: "2026-03-18T16:30:00Z"
labels: ["de1", "brew-feedback", "integration", "scheduler"]

problem: |
  Brew feedback sessions must currently be entered manually via the UI form.
  The user owns a Decent Espresso DE1 and uses visualizer.coffee to auto-upload
  shot data. There is no automated path from a completed espresso shot into
  SzimplaCoffee's BrewFeedback table — meaning the feedback loop between
  real-world brews and the recommendation engine is entirely manual and unlikely
  to stay populated.

desired_outcome: |
  A polling bridge service runs every 5 minutes via APScheduler. It fetches
  new shots from the Visualizer API, fuzzy-matches bean metadata to the
  SzimplaCoffee product catalog, and auto-creates BrewFeedback rows with
  shot telemetry populated. Auto-match can be toggled off via config. Dose
  defaults to 18g when the DE1 shot record does not include a dose override.
  The user's rating and notes remain null until filled in via the UI.

scope_in:
  - "New service: backend/src/szimplacoffee/services/de1_bridge.py"
  - "Polls GET https://visualizer.coffee/api/shots (paginated, newest-first)"
  - "Tracks last-seen shot ID/timestamp in a new DB table: de1_bridge_state"
  - "Fuzzy product matching: bean_brand + bean_type → product catalog (difflib.SequenceMatcher)"
  - "Auto-creates BrewFeedback rows with: dose_grams (default 18), yield_grams, brew_time_seconds, water_temp_c, machine='DE1', linked_product_id (nullable)"
  - "Config keys in config.py: VISUALIZER_USERNAME, VISUALIZER_API_KEY (optional), DE1_AUTO_MATCH (bool, default True), DE1_DEFAULT_DOSE_GRAMS (default 18)"
  - "APScheduler job registered in main.py lifespan: runs every 5 minutes"
  - "New Alembic migration: de1_bridge_state table + brew_feedback telemetry columns"
  - "API endpoint GET /api/v1/de1/status — returns bridge enabled state, last poll time, shots imported count"
  - "API endpoint POST /api/v1/de1/toggle — toggles DE1_AUTO_MATCH at runtime (persisted in de1_bridge_state)"
  - "Unit tests for fuzzy matching logic and bridge state management"
  - "Integration smoke test using a fixture shot payload"

scope_out:
  - "Direct BLE / pyDE1 integration (no Bluetooth adapter on WSL host)"
  - "UI panel for reviewing/approving matched shots (future ticket)"
  - "Rating or notes auto-population (user fills these in manually via existing BrewFeedbackForm)"
  - "Multi-user Visualizer support"
  - "Webhook-based push (Visualizer doesn't support it; polling is correct)"


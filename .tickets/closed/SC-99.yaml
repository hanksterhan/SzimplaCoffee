id: SC-99
title: "Add quality-first server-side product sort mode"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-19T21:54:00Z"
updated_at: "2026-03-19T21:54:00Z"
labels: ["catalog", "backend", "sort", "quality"]

problem: >
  The current "featured" sort is client-window-limited (all results fetched then sorted in
  Python). It works but has no quality-tier awareness: it ranks by has_stock, then
  metadata_confidence, then recency. This doesn't use the merchant's
  overall_quality_score or metadata_quality_score as signals. Products from
  high-quality merchants (tier A, high quality scores) should naturally surface above
  lower-quality merchants when quality is the intent. A new sort mode "quality" would
  let the frontend explicitly request quality-tier ordering.

desired_outcome: >
  A new "quality" sort value in ProductSort surfaces products by:
  1. has_stock (in-stock first)
  2. merchant overall_quality_score descending
  3. metadata_confidence descending
  4. recency (last_seen_at) descending
  Frontend catalog default sort can optionally switch to "quality" or expose it as
  a sort option. Backend test covers the new sort key.

scope_in:
  - "Add 'quality' to ProductSort Literal in schemas/products.py"
  - "Implement quality sort case in _sort_results in api/products.py"
  - "Join or eager-load merchant quality score for sort (avoid N+1)"
  - "Add test for quality sort ordering in test_api_products.py"
  - "Optionally expose quality sort option in frontend sort selector"
scope_out:
  - "Making quality sort the default (keep 'featured' as default for now)"
  - "Server-side SQL ORDER BY migration (Python sort is acceptable for current corpus size)"
  - "Recommendation re-ranking changes"


  - "parser"
  - "recommendation-engine"
problem: "95% of products have empty origin_text, process_text, and tasting_notes_text. The recommendation engine's _espresso_fit() scores every product identically at 0.55 baseline because it operates on empty strings. Recommendations are effectively random noise."
desired_outcome: "A reusable parser module that extracts structured coffee metadata (origin country/region, processing method, tasting notes, roast level, altitude, varietal) from raw product descriptions (HTML body_html from Shopify, description from WooCommerce). Parser should handle common coffee description formats across specialty roasters."
scope_in:
  - "New module: backend/src/szimplacoffee/services/metadata_parser.py"
  - "Parse origin country and region from text (e.g., 'Ethiopia Yirgacheffe', 'Colombia Huila')"
  - "Parse processing method (washed, natural, honey, anaerobic, wet-hulled, etc.)"
  - "Parse tasting notes (freeform text extraction)"
  - "Parse roast level indicators (light, medium, dark, omni)"
  - "Parse altitude when present (e.g., '1800-2100 masl')"
  - "Parse varietal when present (e.g., 'SL28, SL34', 'Gesha', 'Caturra')"
  - "Detect single-origin vs blend from description text"
  - "Detect espresso suitability signals from description text"
  - "Unit tests for parser with sample descriptions from known merchants"
scope_out:
  - "LLM-based extraction (pure regex/heuristic approach)"
  - "Integration into crawl pipeline (that's SC-31)"
  - "Backfilling existing products (that's SC-31)"
  - "Parsing images or non-text content"

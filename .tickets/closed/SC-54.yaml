problem: "The wait_recommendation field is a boolean that only triggers when there are zero candidates. The north-star says the product must be allowed to say wait with a reason — not just a zero-candidates fallback."
desired_outcome: "The system generates a wait recommendation with an explicit rationale when options are below the quality floor, when the best option is borderline, or when a known sale window is approaching."
scope_in:
  - "wait_recommendation can trigger even when candidates exist (e.g., all below quality floor)."
  - "wait_rationale field explains why to wait (e.g., 'best current option scores below 0.5 — check back after next crawl cycle')."
  - "Today page surfaces the rationale when wait is recommended."
scope_out:
  - "Predictive sale forecasting (requires weeks of price history)."
  - "Email or push alerts when a sale is detected."

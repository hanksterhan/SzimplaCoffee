    verify: "cd backend && . .venv/bin/activate && szimpla compute-baselines && python -c \"from szimplacoffee.db import SessionLocal; from szimplacoffee.models import VariantPriceBaseline; s=SessionLocal(); print(s.query(VariantPriceBaseline).count(), 'baselines'); s.close()\""
    status: done
  - id: AC-3
    text: "GET /api/v1/products/{id} response includes baseline_price fields when available"
    verify: "curl -s http://localhost:8000/api/v1/products/1 | python3 -m json.tool | grep baseline"
    status: done
  - id: AC-4
    text: "Backend tests cover baseline computation: empty history, single snapshot, multi-snapshot median"
    verify: "cd backend && pytest tests/ -k baseline -v"

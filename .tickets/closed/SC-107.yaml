id: SC-107
title: "Historical deal baseline per variant (VariantDealFact price history)"
type: feature
priority: p1
status: done
owner: h6nk-bot
created_at: "2026-03-20T08:06:00Z"
updated_at: "2026-03-20T09:40:00Z"
labels: ["backend", "data", "deals", "phase-3"]

problem: >
  SzimplaCoffee tracks current offer snapshots and variant deal facts but does not yet
  compute per-variant price baselines. Without a historical baseline (e.g., median price
  over last 90 days), the app cannot tell users whether a current price is a deal, normal,
  or elevated. The Today view and recommendation engine both need a trustworthy "is this
  a good price right now?" signal to produce actionable buying intelligence.

desired_outcome: >
  Each ProductVariant can be annotated with a computed price baseline (median, min, max)
  derived from its OfferSnapshot and VariantDealFact history. A backend service and
  endpoint expose these baselines. The recommendation engine and Today view can use
  baseline_price to compute a deal_score for ranking. Baselines are refreshed
  incrementally after each crawl.

scope_in:
  - "Add a VariantPriceBaseline model (or computed field on ProductVariant) storing median_price, min_price, max_price, sample_count, baseline_window_days, computed_at"
  - "Add a Alembic migration for any new table or column"
  - "Add a backend service method: compute_variant_baselines(merchant_id=None) that aggregates OfferSnapshot history per variant"
  - "Add CLI command: szimpla compute-baselines"
  - "Expose baselines via /api/v1/products/{id} response (add baseline fields to ProductDetail schema)"
  - "Add backend tests covering baseline computation logic"
scope_out:
  - "No frontend changes in this ticket — Today view deal-score integration is SC-109"
  - "No changes to recommendation ranking weights in this ticket"
  - "No ML model — simple percentile statistics only"

dependencies:
  blockers: []
  unblocks: ["SC-109"]


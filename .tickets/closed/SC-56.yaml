problem: "The north-star says recommendations must be inventory-aware — 'the user must be able to state whether they want 12-18oz, up to 2lb, or up to 5lb, and bulk buys only matter if the user can realistically use the coffee.' But there is no way to record current coffee inventory, so the system cannot factor in when to buy next."
desired_outcome: "A simple personal inventory field records how many grams of coffee the user currently has on hand, and the recommendation engine uses this to adjust buy-now vs wait decisions."
scope_in:
  - "PersonalProfile gets an inventory_on_hand_grams field."
  - "Recommendation request accepts current_inventory_grams as optional input."
  - "When inventory is high, the system down-scores bulk buys and adjusts wait_recommendation threshold."
  - "Today page shows an inventory input that adjusts the daily recommendation."
scope_out:
  - "Multi-bean tracking or per-bag freshness tracking."
  - "Automated inventory deduction from purchase history."

    text: "GET /api/v1/dashboard returns metadata_fill_rates.origin_pct >= 70"
    verify: "cd backend && .venv/bin/python -c \"import sys; sys.path.insert(0,'src'); from szimplacoffee.db import engine; from sqlalchemy import text; c=engine.connect(); tot=c.execute(text(\\\"SELECT COUNT(*) FROM products WHERE is_active=1 AND roast_level != 'unknown'\\\")).scalar(); with_origin=c.execute(text(\\\"SELECT COUNT(*) FROM products WHERE is_active=1 AND roast_level != 'unknown' AND origin_country IS NOT NULL\\\")).scalar(); pct=round(100*with_origin/max(tot,1)); print(f'Coffee-only origin: {with_origin}/{tot} = {pct}%'); assert pct >= 70\""
    status: passed
  - id: AC-2
    text: "goal_status.metadata_70pct=True via dashboard API"

id: SC-92
title: "Fix origin fill denominator to exclude non-coffee products from goal criterion"
type: task
priority: p1
status: done
owner: h6nk-bot
created_at: "2026-03-19T05:40:00Z"
updated_at: "2026-03-19T06:05:00Z"
labels: ["dashboard", "metadata", "backend", "goal-completion"]

problem: "The goal criterion 'coffee metadata populated on >=70% of products' uses all products as the denominator, including non-coffee items (blends with roast_level=unknown, merchandise, subscriptions, equipment). Among actual coffee products (roast_level != 'unknown'), origin fill is 84%. The current all-products calculation yields 63%, incorrectly flagging metadata_70pct=False. The denominator should exclude non-identifiable products."
desired_outcome: "metadata_fill_rates.origin_pct and goal_status.metadata_70pct are computed using coffee-only products (is_active=True AND roast_level != 'unknown') as the denominator. The displayed pct reflects real coffee coverage. goal_status.metadata_70pct flips to True (84% >> 70%)."

scope_in:
  - "Update origin_pct denominator in GET /api/v1/dashboard to exclude products with roast_level='unknown'"
  - "Keep total_products and other counts unchanged (all products)"
  - "Add coffee_product_count field to MetadataFillRates schema showing denominator used"
  - "Update goal_status.metadata_70pct to use the coffee-only denominator"
  - "Update backend test for dashboard metrics to reflect new calculation"
  - "Run npm run gen:api and npm run build to regenerate frontend types"
scope_out:
  - "Changing process_pct, roast_pct, variety_pct denominators (already accurate)"
  - "Frontend MetadataFillCard UI changes beyond type regeneration"
  - "Modifying product data"

dependencies:
  blockers: []
  unblocks: []


id: SC-108
title: "Server-side product sort: quality-first, freshness-aware corpus sort"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-20T08:06:00Z"
updated_at: "2026-03-20T08:06:00Z"
labels: ["backend", "frontend", "catalog", "sort", "phase-3"]

problem: >
  The product catalog currently sorts results by merchant or insertion order, limited to
  the client-side window. With 36 active merchants and 290+ products, there is no
  corpus-wide quality-first sort. Users browsing /products see no coherent ranking —
  a mediocre product from a recently crawled merchant appears before a high-quality
  product from another. Recommendations and the Today view exist for structured buying
  decisions, but the general catalog browse experience needs a trustworthy default order.

desired_outcome: >
  The /api/v1/products/catalog endpoint supports a `sort` parameter (e.g.,
  sort=quality_score, sort=freshness, sort=price_asc, sort=price_desc, sort=default).
  The default sort is quality-first: products ordered by descending quality_score
  (MerchantQualityProfile.overall_score × product-level signals), then by crawl
  freshness (most recently crawled merchant first). The frontend catalog uses this
  sort by default and exposes a sort selector to the user.

scope_in:
  - "Add `sort` query parameter to GET /api/v1/products/catalog (values: quality, freshness, price_asc, price_desc, default)"
  - "Implement quality-first sort: join MerchantQualityProfile.overall_score into catalog query, order by descending score then by last_crawled_at"
  - "Frontend: add sort selector UI to /products catalog page (select or button group)"
  - "Frontend: pass sort param through useProducts hook to API"
  - "Update ProductSummaryResponse or catalog schema if needed for sort param"
  - "Backend test: catalog endpoint returns products in quality-descending order when sort=quality"
scope_out:
  - "No changes to recommendation scoring engine"
  - "No new ML models or learned ranking"
  - "No changes to search endpoint (separate concern)"
  - "No changes to Today view (uses recommendation engine)"


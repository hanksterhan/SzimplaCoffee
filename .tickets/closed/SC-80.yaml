problem: SzimplaCoffee can now persist recommendation_run_id on purchases, but the
  purchases UI does not surface that linkage. After SC-78 lands, users still won't
  be able to audit which purchases were driven by which recommendation runs.
desired_outcome: Purchase history shows when a purchase is linked to a recommendation
  run, and purchase detail provides a clear navigation path back to the originating
  recommendation context.
scope_in:
- Read recommendation_run_id from purchase API responses in the purchases UI
- Show linked recommendation metadata in purchase list and/or purchase detail views
- Add lightweight navigation to the linked recommendation run when data is present
- Keep the UI resilient when recommendation_run_id is null
scope_out:
- Backend model or API changes
- New analytics or conversion reporting dashboards
- Editing or relinking purchases after creation

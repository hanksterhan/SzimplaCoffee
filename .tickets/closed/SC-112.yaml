id: SC-112
title: "Recommendation explainability: why_text narrative"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-20T12:06:00Z"
updated_at: "2026-03-20T12:06:00Z"
labels: ["backend", "frontend", "recommendations", "ux", "phase-4"]

problem: >
  The Today view shows deal_badge and quality score but no human-readable explanation
  of why a coffee ranks first. The north star asks for an explainable recommendation:
  "what coffee should I order right now, from which merchant, in what size, and why?"
  The 'why' is currently missing.

desired_outcome: >
  The top recommendation and runner-ups in the Today view include a `why_text` field:
  1–2 sentences explaining why this coffee ranks where it does. Template-based,
  not LLM-generated. Rendered below the coffee name in TopPickCard on the frontend.

scope_in:
  - "Add `why_text: str` field to RecommendationItem response schema"
  - "Implement template-based why_text generation in recommendation scoring service"
  - "Templates draw from: deal_badge, quality_tier, brew_feedback_count, process_family, origin_country, merchant_tier"
  - "Frontend: render why_text below coffee name in TopPickCard component"
  - "Backend test covering why_text generation for representative cases"

scope_out:
  - "No LLM calls for text generation"
  - "No changes to recommendation scoring weights"
  - "No schema migrations (why_text is computed, not persisted)"
  - "No changes to /recommendations list view (only Today top pick and runners-up)"


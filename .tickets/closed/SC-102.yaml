id: SC-102
title: "Improve metadata fill rate: reduce unknown roast, process, and missing origin on active products"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-20T03:11:00Z"
updated_at: "2026-03-20T04:02:00Z"
labels: ["metadata", "catalog", "data-quality", "phase-2-extended"]

problem: >
  Despite SC-94 adding canonical normalized fields (origin_country, roast_level,
  process_family) with confidence/provenance, current active product coverage is poor:
  - 30% unknown roast_level (283/919 products)
  - 49% unknown process_family (451/919 products)
  - 37% missing origin_country (343/919 products)

  These gaps degrade filter UX (unknown options appear in dropdowns), weaken
  recommendation ranking, and undermine the Phase 2 goal of trustworthy catalog
  semantics. The coffee parser extracts metadata from product names, but many
  products are non-coffee (subscriptions, gear, gift cards) or have names that lack
  roast/process cues. The parser needs stronger pattern coverage and the backfill
  command needs to be smarter about what it skips vs. what it tries harder on.

desired_outcome: >
  After re-running backfill-metadata with improved patterns:
  - Unknown roast_level drops from 30% to ≤ 20% of active products
  - Unknown process_family drops from 49% to ≤ 35% of active products
  - Non-coffee products (gear, subscriptions, gift cards) are excluded from the
    denominator or explicitly tagged as is_coffee=False so they don't inflate
    unknown counts

scope_in:
  - "Audit the current coffee parser patterns in services/parser.py (or equivalent)"
  - "Identify the most common product name patterns that are failing: gear, subscriptions, syrups, etc."
  - "Add a lightweight is_coffee classifier to tag obviously non-coffee products (e.g. 'grinder', 'tamper', 'syrup', 'subscription', 'bundle', 'gift card' → is_coffee=False)"
  - "Improve roast_level patterns to catch common cues missed: 'blonde', 'city+', 'full city', 'northern Italian', 'Scandinavian'"
  - "Improve process_family patterns for common missed terms: 'carbonic maceration', 'extended fermentation', 'anaerobic natural', 'honey washed'"
  - "Run szimpla backfill-metadata after parser improvements"
  - "Verify fill rate improvement by re-counting unknowns before and after"
  - "Ensure non-coffee exclusion or is_coffee flag does not break existing catalog API responses"

scope_out:
  - "Adding description_html scraping (requires crawler changes — out of scope)"
  - "ML-based metadata inference"
  - "Changing Product schema migrations for is_coffee unless needed (prefer runtime logic)"
  - "Backfilling more than roast/process/origin from existing fields"
  - "Changing filter dropdowns in the frontend (separate ticket)"


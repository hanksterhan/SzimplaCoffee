id: SC-103
title: "Brew feedback: boost well-rated products in recommendation scoring"
type: feature
priority: p2
status: done
owner: h6nk-bot
created_at: "2026-03-20T05:31:00Z"
updated_at: "2026-03-20T05:31:00Z"
labels: ["recommendation", "learning-loop", "brew-feedback"]

problem: >
  The recommendation engine currently uses brew feedback only as a penalty: products
  with avg_rating < BREW_PENALTY_THRESHOLD get a score deduction. There is no positive
  signal — a product with an avg rating of 9.5 across 3 sessions scores exactly the same
  as an unrated product. With 3+ brew feedback sessions logged (SC-87), we now have
  enough personal signal to meaningfully boost products that have proven consistently
  excellent in the espresso workflow.

desired_outcome: >
  Highly-rated products (avg_rating ≥ 8.0 across ≥1 feedback sessions) receive a score
  boost in recommendations, with a stronger boost for products with ≥2 sessions.
  The existing penalty for poorly-rated products is preserved. Both boost and penalty
  are reflected in score_breakdown when explain_scores=True. The recommendation UI
  surfaces a "Proven performer" label for boosted products.

scope_in:
  - "Add BREW_BOOST_WEIGHT constant (recommended 0.08) to recommendations.py"
  - "Apply brew boost when avg_rating >= 8.0 and brew_session_count >= 1"
  - "Apply larger boost (1.5x) when brew_session_count >= 2"
  - "Include brew_boost in score_breakdown dict when explain_scores=True"
  - "Add brew_session_count to RecommendationCandidate so the frontend can display signal strength"
  - "Add 'Proven performer (N sessions)' to pros list when boost applied"
  - "Add tests: boost applied for high-rated product; no boost for unrated; penalty for low-rated preserved"
scope_out:
  - "No changes to the penalty behavior or thresholds"
  - "No UI changes beyond adding 'Proven performer' label where pros are already displayed"
  - "No changes to brew feedback data model or API"
  - "No ML or collaborative filtering"


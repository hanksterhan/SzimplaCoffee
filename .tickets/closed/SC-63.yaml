  blockers: ["SC-61", "SC-62"]
  unblocks: ["SC-64"]

acceptance_criteria:
  - id: AC-1
    text: "process fill rate >= 70% after backfill on real product data"
    verify: "cd backend && python -c \"from szimplacoffee.db import engine; from sqlalchemy import text; t=engine.connect().execute(text('SELECT COUNT(*) FROM products')).scalar(); f=engine.connect().execute(text('SELECT COUNT(*) FROM products WHERE process IS NOT NULL')).scalar(); print(f'{f}/{t} = {f/t*100:.1f}%')\""
    status: not_met
    evidence: "Process fill: 266/597 = 44.6% — data limitation, not parser gap. Most products lack process info in names/descriptions."
  - id: AC-2
    text: "roast_level fill rate >= 70% after backfill"
    verify: "cd backend && python -c \"from szimplacoffee.db import engine; from sqlalchemy import text; t=engine.connect().execute(text('SELECT COUNT(*) FROM products')).scalar(); f=engine.connect().execute(text('SELECT COUNT(*) FROM products WHERE roast_level IS NOT NULL')).scalar(); print(f'{f}/{t} = {f/t*100:.1f}%')\""
    status: partial
    evidence: "Roast fill: 367/597 = 61.5% (was 1.8%). Significant improvement via implicit inference (single-origin→light, blend→medium-dark). 70% not met due to products without country/blend signals."
  - id: AC-3
    text: "pytest tests for process and roast_level pass"
    verify: "cd backend && pytest tests/test_coffee_parser.py -v -k 'process or roast'"
    status: met
    evidence: "22 new tests (10 process + 12 roast) all pass. Full suite: 120 passed."


problem: "Process (washed/natural/honey) and roast level (light/medium/dark) fields are nearly empty. These are critical recommendation dimensions. Descriptions frequently contain this information but patterns are absent or too narrow."
desired_outcome: "Process and roast level extraction patterns achieve >70% fill rate on real crawled product descriptions. At least 20 real descriptions are tested. Pytest suite covers the new patterns."

scope_in:
  - "Add/improve process extraction patterns: washed, natural, honey, anaerobic, carbonic maceration"
  - "Add/improve roast level patterns: light, medium, medium-dark, dark, espresso roast"
  - "Test against 20+ real product descriptions from the DB"
  - "Add pytest tests covering all new patterns"
  - "Measure fill rate before and after backfill"
scope_out:
  - "Origin patterns (SC-62)"
  - "Variety/cultivar extraction"
  - "Dashboard metric changes (SC-64)"


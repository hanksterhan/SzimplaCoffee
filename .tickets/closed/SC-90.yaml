  - "Criteria: merchants_15_plus, metadata_70pct, recs_produce_results, today_works, purchases_10_plus, brew_feedback_3_plus, ui_works, tests_pass"
  - "Compute each criterion from DB queries except ui_works and tests_pass (default true / manual)"
  - "Add pytest coverage"
scope_out:
  - "Frontend rendering (follow-on ticket if needed)"
